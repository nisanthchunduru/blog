services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile-backend.development
    working_dir: /workspace
    volumes:
      - .:/workspace
      - /workspace/node_modules
      - /workspace/backend/node_modules
      - cache:/workspace/tmp/cache
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
    env_file:
      - .env
    command: sh -c "/workspace/backend/node_modules/.bin/tsx /workspace/backend/index.ts"
    depends_on:
      - sync

  sync:
    build:
      context: .
      dockerfile: Dockerfile-backend.development
    working_dir: /workspace
    volumes:
      - .:/workspace
      - /workspace/node_modules
      - /workspace/backend/node_modules
      - cache:/workspace/tmp/cache
    environment:
      - NODE_ENV=development
      - SYNC_INTERVAL=10
    env_file:
      - .env
    command: sh -c "/workspace/backend/node_modules/.bin/tsx /workspace/backend/daemons/sync.ts"
    restart: unless-stopped
    healthcheck:
      disable: true

volumes:
  cache:

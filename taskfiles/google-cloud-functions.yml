version: "3"

vars:
  GOOGLE_CLOUD_REGION: us-central1

tasks:
  build:
    cmds:
      - npm run build:google-cloud-functions

  terraform-init:
    dir: infra/google-cloud
    cmds:
      - terraform init

  terraform-plan:
    dir: infra/google-cloud
    dotenv: ['../../.env']
    cmds:
      - terraform init
      - terraform plan
        -var="google_cloud_project_id=${GOOGLE_CLOUD_PROJECT_ID}"
        -var="google_cloud_region={{.GOOGLE_CLOUD_REGION}}"
        -var="content_notion_url=${CONTENT_NOTION_URL}"
        -var="notion_token=${NOTION_TOKEN}"

  terraform-apply:
    dir: infra/google-cloud
    dotenv: ['../../.env']
    cmds:
      - terraform init
      - terraform apply -auto-approve
        -var="google_cloud_project_id=${GOOGLE_CLOUD_PROJECT_ID}"
        -var="google_cloud_region={{.GOOGLE_CLOUD_REGION}}"
        -var="content_notion_url=${CONTENT_NOTION_URL}"
        -var="notion_token=${NOTION_TOKEN}"

  deploy:
    cmds:
      - task: terraform-apply
